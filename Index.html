<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sufi G — Khoye Waale Mutton Chanay &amp; Super Naan Shop | Jalalpur Jattan</title>
<meta name="description" content="Sufi G Khoye Waale Mutton Chanay &amp; Super Naan Shop — open 24 hours on Jalalpur Jattan Road, Gujrat. Mutton chanay, paye, naan, halwa puri. Order on WhatsApp.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Nastaliq+Urdu:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --indigo: #1B2A5E;
    --indigo-deep: #0E1736;
    --crimson: #D8273C;
    --gold: #F5C518;
    --cream: #FBF3E2;
    --paper: #FFFCF5;
    --ink: #261A10;
    --steel: #6B6256;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    font-family:'Inter', sans-serif;
    color:var(--ink);
    background:var(--cream);
    line-height:1.6;
  }

  .urdu{
    font-family:'Noto Nastaliq Urdu', serif;
    direction: rtl;
    line-height: 2.2;
  }

  img{ display:block; max-width:100%; }

  a{ color:inherit; text-decoration:none; }

  /* ---------- Reveal on scroll ---------- */
  .reveal{
    opacity:0;
    transform: translateY(28px);
    transition: opacity .7s ease, transform .7s ease;
  }
  .reveal.in{
    opacity:1;
    transform: translateY(0);
  }

  /* ---------- Header ---------- */
  header{
    position:sticky;
    top:0;
    z-index:50;
    background: var(--indigo);
    border-bottom: 4px solid var(--gold);
  }
  .header-inner{
    max-width:1100px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 18px;
    gap: 14px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .brand img{
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 2px solid var(--gold);
  }
  .brand-text{
    font-family:'Anton', sans-serif;
    color: var(--paper);
    font-size: 1.25rem;
    letter-spacing: 1px;
    line-height: 1;
  }
  .brand-text span{
    display:block;
    font-family:'Noto Nastaliq Urdu', serif;
    font-size: .85rem;
    color: var(--gold);
    letter-spacing: 0;
    margin-top: 3px;
    direction: rtl;
  }
  nav{
    display:flex;
    gap: 18px;
    font-size: .85rem;
    font-weight:600;
    color: var(--cream);
  }
  nav a{ opacity:.85; transition:opacity .2s, color .2s; margin-left: 18px; }
  nav a:first-child{ margin-left:0; }
  nav a:hover{ opacity:1; color: var(--gold); }
  .order-btn{
    background: var(--crimson);
    color:#fff;
    font-weight:700;
    font-size:.85rem;
    padding: 9px 16px;
    border-radius: 999px;
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
    box-shadow: 0 4px 14px rgba(216,39,60,.35);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .order-btn:hover{ transform: translateY(-2px); box-shadow: 0 8px 20px rgba(216,39,60,.45); }

  @media (max-width:760px){
    nav{ display:none; }
  }

  /* ---------- Hero ---------- */
  .hero{
    position:relative;
    min-height: 88vh;
    display:flex;
    align-items:flex-end;
    background-image:
      linear-gradient(180deg, rgba(14,23,54,.35) 0%, rgba(14,23,54,.55) 45%, rgba(14,23,54,.96) 100%),
      url('images/food-spread.jpg');
    background-size: cover;
    background-position: center 30%;
    color: var(--paper);
  }
  .hero-content{
    max-width:1100px;
    margin: 0 auto;
    width:100%;
    padding: 90px 24px 50px;
    position:relative;
  }
  .open-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background: var(--gold);
    color: var(--indigo-deep);
    font-weight:800;
    font-size:.78rem;
    letter-spacing: 1.5px;
    text-transform:uppercase;
    padding: 7px 16px;
    border-radius: 999px;
    margin-bottom: 22px;
  }
  .open-pill .dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--crimson);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(216,39,60,.55); }
    70%{ box-shadow:0 0 0 7px rgba(216,39,60,0); }
  }

  .hero h1{
    font-family:'Anton', sans-serif;
    font-size: clamp(3rem, 11vw, 6.2rem);
    letter-spacing: 2px;
    line-height: .95;
    text-shadow: 0 4px 24px rgba(0,0,0,.4);
  }
  .hero h1 .accent{ color: var(--gold); }

  .hero .urdu-title{
    display: inline-block;
    font-size: clamp(1.5rem, 4.5vw, 2.6rem);
    color: var(--gold);
    margin-top: 6px;
  }

  .hero p.tagline{
    max-width: 480px;
    margin-top: 16px;
    font-size: 1.02rem;
    color: #EFE8DA;
  }

  .hero-ctas{
    margin-top: 28px;
    display:flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 13px 24px;
    border-radius: 999px;
    font-weight: 700;
    font-size: .92rem;
    transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
  }
  .btn-primary{
    background: var(--crimson);
    color: #fff;
    box-shadow: 0 6px 18px rgba(216,39,60,.4);
  }
  .btn-primary:hover{ transform: translateY(-2px); box-shadow:0 10px 24px rgba(216,39,60,.5); }
  .btn-outline{
    border: 1.5px solid rgba(255,255,255,.55);
    color: #fff;
  }
  .btn-outline:hover{ background: rgba(255,255,255,.12); transform: translateY(-2px); }

  /* ---------- Info strip ---------- */
  .strip{
    background: var(--indigo-deep);
    color: var(--cream);
  }
  .strip-inner{
    max-width:1100px;
    margin:0 auto;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
  }
  .strip-item{
    padding: 22px 24px;
    border-left: 1px solid rgba(245,197,24,.18);
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .strip-item:first-child{ border-left:none; }
  .strip-item .label{
    font-size:.72rem;
    text-transform:uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    font-weight:700;
  }
  .strip-item .value{
    font-size: .98rem;
    font-weight: 600;
    color:#fff;
  }
  .strip-item .value a{ color: var(--gold); }
  @media (max-width:760px){
    .strip-inner{ grid-template-columns: 1fr; }
    .strip-item{ border-left:none; border-top:1px solid rgba(245,197,24,.18); }
    .strip-item:first-child{ border-top:none; }
  }

  /* ---------- Section shells ---------- */
  section{
    padding: 70px 24px;
  }
  .section-inner{
    max-width: 1100px;
    margin: 0 auto;
  }
  .eyebrow{
    font-size: .75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 800;
    color: var(--crimson);
    margin-bottom: 10px;
  }
  .section-title{
    font-family:'Anton', sans-serif;
    font-size: clamp(2.2rem, 6vw, 3.4rem);
    letter-spacing: 1px;
    color: var(--indigo);
  }
  .section-lede{
    max-width: 560px;
    margin-top: 12px;
    color: var(--steel);
    font-size: 1rem;
  }

  /* ---------- Menu poster (signature element) ---------- */
  .menu-wrap{
    background: var(--cream);
  }
  .poster{
    position: relative;
    margin-top: 42px;
    background: linear-gradient(160deg, var(--indigo) 0%, var(--indigo-deep) 100%);
    border-radius: 18px;
    padding: 46px 28px 56px;
    overflow: hidden;
    box-shadow: 0 30px 60px -25px rgba(14,23,54,.55);
  }
  /* scalloped stamp edges */
  .poster::before,
  .poster::after{
    content:"";
    position:absolute;
    left:0; right:0;
    height: 22px;
    background:
      radial-gradient(circle at 16px 50%, transparent 12px, var(--cream) 12.6px) 0 0/32px 32px repeat-x;
    pointer-events:none;
  }
  .poster::before{ top:-1px; }
  .poster::after{ bottom:-1px; transform: rotate(180deg); }

  .poster-stamp{
    position:absolute;
    top: -40px;
    right: -40px;
    width: 230px;
    opacity: .07;
    transform: rotate(12deg);
    filter: grayscale(1) brightness(3);
  }

  .poster-header{
    text-align:center;
    position:relative;
    z-index:2;
  }
  .poster-header .small{
    color: var(--gold);
    font-size: .8rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .poster-header h3{
    font-family:'Anton', sans-serif;
    color: var(--paper);
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    letter-spacing: 1px;
    margin-top: 6px;
  }
  .poster-header .urdu{
    color: var(--gold);
    font-size: 1.4rem;
    margin-top: 4px;
    direction: rtl;
  }
  .poster-divider{
    width: 70px;
    height: 3px;
    background: var(--gold);
    margin: 22px auto 30px;
    border-radius: 2px;
  }

  .menu-grid{
    position:relative;
    z-index:2;
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 28px;
  }
  @media (max-width:680px){
    .menu-grid{ grid-template-columns: 1fr; }
  }
  .menu-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap: 14px;
    padding: 13px 0;
    border-bottom: 1px dashed rgba(245,197,24,.28);
  }
  .menu-row .names{
    display:flex;
    flex-direction:column;
    gap: 2px;
  }
  .menu-row .en{
    color: var(--paper);
    font-weight: 600;
    font-size: .98rem;
  }
  .menu-row .ur{
    color: rgba(255,255,255,.55);
    font-size: .92rem;
    direction: rtl;
  }
  .menu-row .price{
    flex-shrink:0;
    background: var(--crimson);
    color: #fff;
    font-weight: 800;
    font-size: .92rem;
    padding: 5px 12px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .menu-note{
    position:relative;
    z-index:2;
    text-align:center;
    color: rgba(255,255,255,.6);
    font-size: .82rem;
    margin-top: 30px;
    letter-spacing: .5px;
  }

  /* ---------- Gallery ---------- */
  .gallery-grid{
    margin-top: 38px;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: 220px 220px;
    gap: 12px;
  }
  .gallery-grid figure{ position:relative; overflow:hidden; border-radius: 12px; margin:0; }
  .gallery-grid img{
    width:100%; height:100%; object-fit:cover;
    transition: transform .5s ease;
  }
  .gallery-grid figure:hover img{ transform: scale(1.06); }
  .gallery-grid figcaption{
    position:absolute;
    left:0; right:0; bottom:0;
    padding: 10px 12px;
    background: linear-gradient(180deg, transparent, rgba(14,23,54,.85));
    color:#fff;
    font-size: .8rem;
    font-weight:600;
    letter-spacing:.4px;
  }
  .g1{ grid-column: 1 / 3; grid-row: 1 / 3; }
  .g2{ grid-column: 3 / 4; grid-row: 1 / 2; }
  .g3{ grid-column: 3 / 4; grid-row: 2 / 3; }
  .g4{ grid-column: 1 / 2; grid-row: 3 / 4; }
  .g5{ grid-column: 2 / 4; grid-row: 3 / 4; }
  .gallery-grid{ grid-template-rows: 260px 260px 200px; }

  @media (max-width: 760px){
    .gallery-grid{
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 180px 180px 180px;
    }
    .g1{ grid-column:1/3; grid-row:1/2; }
    .g2{ grid-column:1/2; grid-row:2/3; }
    .g3{ grid-column:2/3; grid-row:2/3; }
    .g4{ grid-column:1/2; grid-row:3/4; }
    .g5{ grid-column:2/3; grid-row:3/4; }
  }

  /* ---------- Location ---------- */
  .location-wrap{
    background: var(--indigo);
    color: var(--cream);
  }
  .location-grid{
    margin-top: 36px;
    display:grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 28px;
    align-items:stretch;
  }
  @media (max-width:760px){
    .location-grid{ grid-template-columns: 1fr; }
  }
  .location-card{
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(245,197,24,.2);
    border-radius: 16px;
    padding: 32px;
  }
  .location-card .label{
    font-size:.72rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color: var(--gold);
    font-weight:800;
    margin-bottom:6px;
  }
  .location-card .addr{
    font-size: 1.3rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 22px;
    line-height:1.4;
  }
  .location-list{
    display:flex;
    flex-direction:column;
    gap: 16px;
    margin-bottom: 26px;
  }
  .location-list .row{
    display:flex;
    justify-content:space-between;
    border-bottom: 1px dashed rgba(255,255,255,.15);
    padding-bottom: 12px;
    font-size: .95rem;
  }
  .location-list .row span:first-child{ color: rgba(255,255,255,.6); }
  .location-list .row span:last-child{ font-weight:700; color: #fff; }

  .map-frame{
    border-radius: 16px;
    overflow:hidden;
    min-height: 320px;
    border: 1px solid rgba(245,197,24,.2);
  }
  .map-frame iframe{ width:100%; height:100%; min-height:320px; border:0; display:block; }

  /* ---------- Footer ---------- */
  footer{
    background: var(--indigo-deep);
    color: rgba(255,255,255,.65);
    padding: 40px 24px 28px;
    text-align:center;
    font-size: .85rem;
  }
  footer .f-brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom: 12px;
  }
  footer .f-brand img{
    width: 38px; height:38px; border-radius:50%;
    border: 2px solid var(--gold);
  }
  footer .f-brand span{
    font-family:'Anton', sans-serif;
    color: #fff;
    font-size: 1.1rem;
    letter-spacing: 1px;
  }
  footer a{ color: var(--gold); font-weight:600; }
  footer .owner{ margin-top: 10px; color: rgba(255,255,255,.4); font-size:.78rem; }
</style>
</head>
